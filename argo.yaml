
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hr-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Dhanigasree/Duniversity-College-Portal.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: hr-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true